server:
  port: 8080

spring:
  application:
    name: devopshub-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/devopshub}
  jackson:
    time-zone: UTC

jwt:
  secret: ${JWT_SECRET:devopshub-secret-key-change-me}
  expiration: 86400000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.devopshub: INFO
